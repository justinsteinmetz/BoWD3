<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Because of Winn-Dixie — Reading Journey</title>
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Patrick+Hand&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body class="locked">

<!-- LOGIN -->
<div id="login-screen" class="login-screen">
  <div class="login-box">
    <div class="login-title">Because of Winn-Dixie</div>
    <div class="entry-prompt">Enter your name</div>
    <input id="nameInput" type="text" placeholder="Your name" autocomplete="off"
           onkeydown="if(event.key==='Enter') startSession()">
    <button onclick="startSession()">Start reading →</button>
  </div>
</div>

<!-- TEACHER PANEL (Shift+T) -->
<div id="teacher-panel">
  <span class="teacher-label">Shift+U unlock next act &nbsp;·&nbsp; Shift+F focus mode</span>
</div>

<!-- HEADER -->
<header class="masthead">
  <div class="masthead-label">A Reading Journey</div>
  <h1>Because of Winn-Dixie</h1>
  <div class="masthead-author">Kate DiCamillo</div>
</header>

<!-- NAV -->
<div class="zone-nav-wrap">
  <nav id="nav" class="zone-nav"></nav>
</div>

<!-- APP -->
<main id="app"></main>

<script src="zones.js"></script>
<script src="app.js"></script>
</body>
</html>
